server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect to HTTPS when an upstream TLS-terminating proxy (Cloudflare,
    # ALB, etc.) tells us the original request was HTTP. Direct hits to :80
    # in local docker-compose dev have no X-Forwarded-Proto header, so this
    # `if` doesn't fire and dev still works.
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # Security headers — applied to every response. `always` ensures they're
    # set on error responses too.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    # CSP: 'unsafe-inline' on script-src is needed for Vite's modulepreload
    # polyfill. Tighten with a nonce-based policy if/when Vite gains support.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # SPA fallback — all non-file, non-API paths return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the FastAPI backend container
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
